name: deploy

on:
    push:
        branches:
            - main

permissions:
    id-token: write
    contents: read
jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@4
            - uses: actions/setup-node@4
              with:
                node-version: 22
            - run: npm install
            - uses: configure aws credential
              with:
                role-to-assume: https://us-east-1.console.aws.amazon.com/lambda/home?region=us-east-1#/begin
                aws-region: us-east-1
            - name: deploy
              run: npm run deploy



