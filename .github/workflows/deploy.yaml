name: deploy

on:
    push:
        branches:
            - main

permissions:
    id-token: write
    contents: read
jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 22
            - run: npm install
            - uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::756822824921:role/GitHubDeployRole
                aws-region: us-east-1
            - name: Verify AWS
              run: aws sts get-caller-identity
            - name: Serverless version
              run: npx serverless --version
            - name: deploy
              run: npm run deploy



