AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: Hello World Lambda

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs22.x
    MemorySize: 128

Resources:

  HelloFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.handler

      Events:
        HelloApi:
          Type: HttpApi
          Properties:
            Path: /
            Method: GET

Outputs:

  ApiUrl:
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"